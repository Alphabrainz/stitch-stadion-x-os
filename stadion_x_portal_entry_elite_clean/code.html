<!DOCTYPE html>

<html class="dark" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><script id="tailwind-config">try{
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#D4AF37", // Metallic Gold
                        "primary-container": "#D4AF37",
                        "on-primary": "#000000",
                        "secondary": "#B0B0B0",
                        "background": "#000000",
                        "surface": "#000000",
                        "surface-container": "#121212",
                        "surface-container-high": "#1A1A1A",
                        "outline": "#D4AF37",
                        "outline-variant": "rgba(212, 175, 55, 0.3)",
                        "brand-red": "#FF0000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "24px",
                        "2xl": "32px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "sm": "8px",
                        "xl": "40px",
                        "lg": "24px",
                        "xs": "4px",
                        "unit": "4px",
                        "gutter": "24px",
                        "md": "16px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Hanken Grotesk"],
                        "caption": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "label-bold": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500", "letterSpacing": "0.15em"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    }catch(_e){}</script>
<style>
@keyframes fade-in-right {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes fade-in-left {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes pulse-glow {
    0%, 100% { opacity: 0.15; transform: scale(1) translate(-50%, -50%); }
    50% { opacity: 0.25; transform: scale(1.1) translate(-45%, -45%); }
}
@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.animate-fade-right { animation: fade-in-right 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.animate-fade-left { animation: fade-in-left 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.animate-pulse-glow { animation: pulse-glow 8s ease-in-out infinite; transform-origin: top left; }

.stagger-1 { animation-delay: 0.2s; opacity: 0; }
.stagger-2 { animation-delay: 0.4s; opacity: 0; }
.stagger-3 { animation-delay: 0.6s; opacity: 0; }
.stagger-4 { animation-delay: 0.8s; opacity: 0; }
.stagger-5 { animation-delay: 1.0s; opacity: 0; }

.glass-panel {
    background: rgba(8, 8, 8, 0.75);
    backdrop-filter: blur(60px);
    -webkit-backdrop-filter: blur(60px);
    border-left: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: -20px 0 80px rgba(0,0,0,0.9);
}

/* Floating Label Styles */
.input-field:focus ~ .floating-label,
.input-field:not(:placeholder-shown) ~ .floating-label {
    transform: translateY(-130%) scale(0.85);
    color: #D4AF37;
}

.shimmer-bg {
    position: relative;
    overflow: hidden;
}
.shimmer-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 3s infinite;
}
</style>
</head>
<body class="bg-black font-body-md text-on-surface min-h-screen flex w-full relative overflow-hidden antialiased selection:bg-primary/30 selection:text-white">

    <!-- Left Side: Cinematic Branding (Hidden on small screens) -->
    <div class="hidden lg:flex flex-1 relative items-center justify-center bg-[#030303] overflow-hidden">
        <!-- Ambient Red Glow -->
        <div class="absolute top-1/2 left-1/2 w-[800px] h-[800px] bg-brand-red rounded-full blur-[150px] mix-blend-screen opacity-10 animate-pulse-glow pointer-events-none"></div>
        
        <!-- Large Background Typography -->
        <div class="absolute left-[-10%] top-1/4 text-[200px] font-black tracking-tighter text-white/[0.02] leading-none pointer-events-none select-none uppercase transform -rotate-90 origin-left">
            Stadion
        </div>
        
        <div class="relative z-10 flex flex-col items-center animate-fade-left">
            <div class="w-64 h-64 rounded-full overflow-hidden border border-outline-variant p-2 mb-8 relative shadow-[0_0_80px_rgba(255,0,0,0.1)]">
                <div class="absolute inset-0 border border-primary/20 rounded-full animate-[spin_10s_linear_infinite]"></div>
                <img src="logo.png" alt="STADION X" class="w-full h-full object-cover rounded-full relative z-10 filter contrast-125" />
            </div>
            <h1 class="font-display-lg text-[48px] tracking-[0.3em] font-black uppercase text-white drop-shadow-2xl">Stadion <span class="text-brand-red">X</span></h1>
            <p class="mt-4 text-secondary/60 tracking-[0.4em] text-sm uppercase font-label-bold">Secure Operating System</p>
            
            <div class="mt-12 flex gap-4">
                <div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></div>
                <div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
                <div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
            </div>
        </div>
    </div>

    <!-- Right Side: Login Panel -->
    <div class="w-full lg:w-[550px] h-full flex flex-col glass-panel relative z-20 overflow-y-auto custom-scrollbar animate-fade-right px-8 py-16 md:px-16 md:py-24 justify-center">
        <!-- Inner glow -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary rounded-full blur-[120px] mix-blend-screen opacity-[0.03] pointer-events-none"></div>

        <div class="relative z-10 flex flex-col h-full justify-center">
            
            <!-- Mobile Logo (Shows only on mobile) -->
            <div class="lg:hidden flex items-center gap-4 mb-12 animate-fade-right stagger-1">
                <img src="logo.png" alt="Logo" class="w-12 h-12 rounded-full border border-outline-variant" />
                <span class="font-display-lg text-[24px] tracking-[0.2em] font-black uppercase text-white">Stadion X</span>
            </div>

            <div class="mb-12 animate-fade-right stagger-1">
                <h2 class="font-headline-md text-[36px] text-white font-bold tracking-wide mb-2">Welcome Back.</h2>
                <p class="text-secondary tracking-widest uppercase text-xs font-label-bold">Please authenticate to continue</p>
            </div>

            <form id="login-form" class="flex flex-col gap-8 w-full">
                <!-- Floating Label Email -->
                <div class="relative pt-6 animate-fade-right stagger-2 group">
                    <input type="text" id="email" class="input-field peer w-full bg-transparent border-0 border-b-2 border-white/10 text-white font-body-lg text-[18px] py-2 px-0 focus:ring-0 focus:border-primary transition-colors placeholder-transparent" placeholder="Email" autocomplete="off" spellcheck="false" />
                    <label for="email" class="floating-label absolute left-0 top-[32px] text-secondary/60 font-label-bold uppercase tracking-widest text-sm transition-all duration-300 pointer-events-none flex items-center gap-3">
                        <span class="material-symbols-outlined text-[18px]">mail</span> Identifier
                    </label>
                </div>

                <!-- Floating Label Password -->
                <div class="relative pt-6 animate-fade-right stagger-3 group">
                    <input type="password" id="password" class="input-field peer w-full bg-transparent border-0 border-b-2 border-white/10 text-white font-body-lg text-[18px] py-2 px-0 focus:ring-0 focus:border-primary transition-colors placeholder-transparent tracking-[0.3em]" placeholder="Password" />
                    <label for="password" class="floating-label absolute left-0 top-[32px] text-secondary/60 font-label-bold uppercase tracking-widest text-sm transition-all duration-300 pointer-events-none flex items-center gap-3">
                        <span class="material-symbols-outlined text-[18px]">key</span> Security Key
                    </label>
                    <!-- Small toggle eye icon -->
                    <button type="button" class="absolute right-0 top-[32px] text-secondary hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
                
                <div class="flex justify-end animate-fade-right stagger-3">
                    <a href="#" class="text-primary hover:text-white transition-colors text-xs font-label-bold uppercase tracking-widest">Forgot Key?</a>
                </div>

                <div class="mt-8 flex flex-col gap-6 animate-fade-right stagger-4">
                    <!-- Primary Button -->
                    <button type="submit" class="w-full bg-gradient-to-r from-primary to-[#b8952b] text-black font-black uppercase tracking-[0.2em] py-4 rounded-xl shadow-[0_0_20px_rgba(212,175,55,0.2)] hover:shadow-[0_0_40px_rgba(212,175,55,0.5)] transition-all duration-300 flex items-center justify-center gap-3 shimmer-bg hover:-translate-y-1 active:translate-y-0 cursor-pointer">
                        Authenticate <span class="material-symbols-outlined font-bold">arrow_forward</span>
                    </button>

                    <div class="flex items-center gap-4">
                        <div class="h-px bg-white/10 flex-1"></div>
                        <span class="text-secondary/40 text-[10px] font-label-bold uppercase tracking-[0.2em]">External Identity</span>
                        <div class="h-px bg-white/10 flex-1"></div>
                    </div>

                    <!-- Premium Google Button -->
                    <button type="button" class="w-full bg-black/40 border border-white/10 hover:border-white/30 text-white font-label-bold uppercase tracking-widest py-3 rounded-xl transition-all duration-300 flex items-center justify-center gap-4 group cursor-pointer">
                        <div class="w-6 h-6 rounded-full bg-white flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-4 h-4" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                                <path class="" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                            </svg>
                        </div>
                        <span class="text-[12px]">Continue with Google</span>
                    </button>
                </div>
            </form>
            
            <div class="mt-auto pt-12 animate-fade-right stagger-5 text-center">
                <p class="text-secondary/40 text-[10px] font-label-bold uppercase tracking-[0.2em]">Stadion X OS v2.0 • Authorized Personnel Only</p>
            </div>
        </div>
    </div>

    <script>
        // Simulate Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin font-bold">sync</span> <span class="tracking-[0.2em]">Verifying...</span>';
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined font-bold">lock_open</span> <span class="tracking-[0.2em]">Access Granted</span>';
                btn.classList.replace('from-primary', 'from-green-500');
                btn.classList.replace('to-[#b8952b]', 'to-green-700');
                btn.classList.replace('text-black', 'text-white');
                
                // Notify Parent OS wrapper
                setTimeout(() => {
                    if(window.parent && typeof window.parent.loginSuccess === 'function') {
                        window.parent.loginSuccess();
                    }
                }, 1000);
            }, 1800);
        });
    </script>
</body>
</html>
